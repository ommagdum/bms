server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: bank1234
    key-store-type: PKCS12
    enabled: true

spring:
  application:
    name: bms

  datasource:
    primary:
      jdbc-url: jdbc:postgresql://localhost:5432/banking_db
      username: bankadmin
      password: bank1234
      driver-class-name: org.postgresql.Driver
    audit:
      jdbc-url: jdbc:postgresql://localhost:5432/banking_audit_db
      username: bankadmin
      password: bank1234
      driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs


management:
  endpoints:
    web:
      exposure:
        include: "*"

